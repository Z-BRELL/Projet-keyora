# Vhost Nginx pour keyora.org (frontend Next.js)
# À placer dans /etc/nginx/sites-available/ puis lier dans sites-enabled/.
# Certbot réécrira ce fichier pour ajouter le bloc HTTPS (443) + redirection.

server {
    listen 80;
    listen [::]:80;
    server_name keyora.org www.keyora.org;

    # Redirige www -> apex pour n'avoir qu'une seule origine (simplifie CORS)
    if ($host = www.keyora.org) {
        return 301 https://keyora.org$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
